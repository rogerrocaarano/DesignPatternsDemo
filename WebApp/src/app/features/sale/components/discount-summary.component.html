<section class="rounded-lg border border-neutral-200 bg-white p-5">
  <h2 class="text-sm font-semibold tracking-wide text-neutral-500 uppercase">Resumen</h2>

  <dl class="mt-4 space-y-2 text-sm">
    <div class="flex justify-between text-neutral-700">
      <dt>Subtotal</dt>
      <dd class="tabular-nums">{{ store.subtotal() | number: '1.2-2' }}</dd>
    </div>

    @if (store.discount(); as discount) {
      <div class="flex justify-between text-neutral-700">
        <dt>Descuento</dt>
        <dd class="tabular-nums">− {{ discount.amount | number: '1.2-2' }}</dd>
      </div>
      <p class="rounded-md bg-neutral-100 px-3 py-2 text-xs text-neutral-600">
        {{ discount.message }}
      </p>
    }

    <div class="flex justify-between border-t border-neutral-200 pt-2 text-base font-semibold text-neutral-900">
      <dt>Total</dt>
      <dd class="tabular-nums">{{ store.total() | number: '1.2-2' }}</dd>
    </div>
  </dl>

  <button
    type="button"
    (click)="store.calculateDiscount()"
    [disabled]="!store.canCalculate() || store.discountStatus() === 'loading'"
    class="mt-4 w-full rounded-md border border-neutral-900 px-4 py-2 text-sm font-medium text-neutral-900 transition hover:bg-neutral-900 hover:text-white disabled:cursor-not-allowed disabled:border-neutral-300 disabled:text-neutral-300 disabled:hover:bg-transparent"
  >
    {{ store.discountStatus() === 'loading' ? 'Calculando…' : 'Calcular descuento' }}
  </button>
</section>
